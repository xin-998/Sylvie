<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sylvie</title>
  <style>
    :root {
      --bg: #090b10;
      --panel: rgba(18, 22, 30, .78);
      --panel-2: rgba(255, 255, 255, .06);
      --line: rgba(255, 255, 255, .13);
      --text: #f7f3ea;
      --muted: rgba(247, 243, 234, .62);
      --mint: #8ef0cf;
      --coral: #ff8a7a;
      --gold: #ffd080;
      --violet: #b9a7ff;
      --blue: #7bc7ff;
      --green: #b9e47a;
      --danger: #ff5f73;
      --cyan: #7df7ff;
      --rose: #ff7ab6;
      --shadow: rgba(0, 0, 0, .42);
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(180deg, rgba(9, 11, 16, .54), rgba(9, 11, 16, .84)),
        url("assets/smoke-whisky-casino-bg.svg"),
        radial-gradient(ellipse at 14% 78%, transparent 0 8%, rgba(255, 208, 128, .13) 8.2% 8.8%, transparent 9.1% 100%),
        radial-gradient(ellipse at 14% 78%, rgba(255, 138, 122, .16), transparent 17%),
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.028) 1px, transparent 1px),
        radial-gradient(circle at 18% -8%, rgba(125, 247, 255, .24), transparent 34%),
        radial-gradient(circle at 88% 4%, rgba(255, 208, 128, .18), transparent 30%),
        linear-gradient(160deg, #090b10 0%, #111018 48%, #090b10 100%);
      background-size: auto, cover, auto, auto, 42px 42px, 42px 42px, auto, auto, auto;
      background-position: center, center, center, center, 0 0, 0 0, center, center, center;
      background-attachment: fixed;
      padding: 18px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 77% 78%, transparent 0 10%, rgba(247,243,234,.12) 10.2% 10.6%, transparent 10.9% 100%),
        radial-gradient(ellipse at 78% 82%, rgba(255,208,128,.12), transparent 18%),
        repeating-radial-gradient(ellipse at 72% 22%, transparent 0 26px, rgba(247,243,234,.045) 27px 29px, transparent 30px 64px),
        linear-gradient(115deg, transparent 0 18%, rgba(125,247,255,.07) 19%, transparent 21% 62%, rgba(255,208,128,.06) 63%, transparent 65%),
        radial-gradient(ellipse at 50% 120%, rgba(125,247,255,.08), transparent 58%);
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.92), rgba(0,0,0,.24));
    }

    body::after {
      content: "WHISKY  SMOKE  ROULETTE";
      position: fixed;
      right: -120px;
      bottom: 58px;
      z-index: -1;
      width: 720px;
      transform: rotate(-14deg);
      color: rgba(247, 243, 234, .045);
      font-size: 4.9rem;
      font-weight: 800;
      letter-spacing: .14em;
      line-height: 1.05;
      pointer-events: none;
      text-align: right;
    }

    .shell::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 9% 52%, transparent 0 4%, rgba(247,243,234,.09) 4.2% 4.6%, transparent 4.9% 100%),
        radial-gradient(ellipse at 10% 54%, rgba(255,208,128,.08), transparent 9%),
        repeating-linear-gradient(135deg, transparent 0 28px, rgba(255,255,255,.032) 29px 30px, transparent 31px 68px),
        linear-gradient(128deg, transparent 0 58%, rgba(125,247,255,.08) 58.4% 59.2%, transparent 59.6% 100%),
        linear-gradient(48deg, transparent 0 18%, rgba(255,208,128,.075) 18.4% 19.2%, transparent 19.6% 100%);
    }

    button,
    input,
    select {
      font: inherit;
    }

    .shell {
      position: relative;
      width: min(1040px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 6px 2px 2px;
      flex-wrap: wrap;
    }

    .brand {
      display: grid;
      gap: 3px;
    }

    h1,
    h2 {
      margin: 0;
      font-weight: 650;
      letter-spacing: 0;
    }

    h1 {
      font-size: clamp(1.35rem, 3.5vw, 2.3rem);
    }

    .sub {
      color: var(--muted);
    }

    .eyebrow {
      width: fit-content;
      border: 1px solid rgba(142,240,207,.22);
      border-radius: 999px;
      padding: 4px 9px;
      color: rgba(142,240,207,.92);
      background: rgba(142,240,207,.08);
      font-size: .82rem;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .status,
    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 11px;
      color: var(--text);
      background: rgba(255, 255, 255, .06);
      backdrop-filter: blur(14px);
      white-space: nowrap;
    }

    .status.safe {
      border-color: rgba(142,240,207,.38);
      background: rgba(142,240,207,.12);
      color: var(--mint);
    }

    .status.watch {
      border-color: rgba(255,138,122,.38);
      background: rgba(255,138,122,.12);
      color: var(--coral);
    }

    .status.penalty {
      border-color: rgba(255,95,115,.42);
      background: rgba(255,95,115,.14);
      color: #ff9aa6;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(286px, 360px);
      gap: 16px;
      align-items: start;
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    .card {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 18px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, .09), rgba(255, 255, 255, .035)),
        var(--panel);
      box-shadow: 0 24px 70px var(--shadow);
      backdrop-filter: blur(22px);
      padding: 16px;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(120deg, rgba(255, 255, 255, .16), transparent 28%, transparent 70%, rgba(142, 240, 207, .08));
      opacity: .8;
    }

    .card > * {
      position: relative;
    }

    .control-card {
      display: grid;
      grid-template-columns: 136px minmax(0, 1fr);
      gap: 18px;
      align-items: center;
      min-height: 320px;
    }

    .score {
      --score: 100;
      width: 132px;
      aspect-ratio: 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at center, #10131b 0 57%, transparent 58%),
        conic-gradient(var(--mint) calc(var(--score) * 1%), rgba(255,255,255,.12) 0);
      border: 1px solid rgba(255, 255, 255, .16);
      box-shadow:
        inset 0 0 0 10px rgba(255, 255, 255, .035),
        0 0 44px rgba(142, 240, 207, .18);
    }

    .score strong {
      font-size: 1.65rem;
      font-weight: 650;
    }

    .controls {
      display: grid;
      gap: 14px;
    }

    .pair {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
    }

    input,
    select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, .065);
      color: var(--text);
      padding: 9px 11px;
      outline: none;
    }

    select option {
      background: #10131b;
      color: var(--text);
    }

    input[type="range"] {
      min-height: 24px;
      padding: 0;
      accent-color: var(--mint);
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      gap: 6px;
      color: rgba(247, 243, 234, .88);
    }

    .note {
      min-height: 24px;
      color: var(--muted);
    }

    .quick {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 7px;
    }

    .quick button {
      min-height: 34px;
      padding: 6px 8px;
      color: rgba(247, 243, 234, .84);
      background: rgba(255, 255, 255, .045);
    }

    .quick button.active {
      color: #06110e;
      border-color: transparent;
      background: linear-gradient(135deg, var(--mint), #d8fff4);
      box-shadow: 0 0 22px rgba(142,240,207,.18);
      font-weight: 650;
    }

    .rule {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .rule-item {
      min-height: 62px;
      display: grid;
      align-content: center;
      gap: 4px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, .045);
    }

    .rule-item strong {
      font-size: .92rem;
    }

    .rule-item span {
      color: var(--muted);
      font-size: .84rem;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 12px;
      min-height: 42px;
      padding: 9px 14px;
      color: var(--text);
      background: rgba(255, 255, 255, .07);
      cursor: pointer;
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: rgba(142, 240, 207, .46);
      background: rgba(255, 255, 255, .1);
    }

    .primary {
      background: linear-gradient(135deg, var(--mint), #d5fff2);
      border-color: transparent;
      color: #07110e;
      font-weight: 650;
    }

    .ghost {
      background: transparent;
    }

    .history-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .history {
      display: grid;
      gap: 9px;
    }

    .day {
      display: grid;
      grid-template-columns: 64px minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-top: 1px solid var(--line);
    }

    .bars {
      display: grid;
      gap: 5px;
    }

    .tiny {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
    }

    .bar {
      height: 7px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, .08);
    }

    .bar span {
      display: block;
      height: 100%;
      border-radius: 999px;
    }

    .smoke span {
      background: var(--danger);
    }

    .drink span {
      background: var(--coral);
    }

    .empty {
      padding: 14px 0 4px;
      color: var(--muted);
      text-align: center;
    }

    .wheel-card {
      display: grid;
      gap: 14px;
      background:
        linear-gradient(135deg, rgba(255, 208, 128, .10), transparent 34%),
        repeating-linear-gradient(90deg, rgba(255,255,255,.035) 0 1px, transparent 1px 18px),
        radial-gradient(circle at 50% 0%, rgba(142, 240, 207, .22), transparent 38%),
        radial-gradient(circle at 50% 58%, rgba(255, 138, 122, .12), transparent 48%),
        var(--panel);
    }

    .wheel-card::after {
      content: "";
      position: absolute;
      inset: auto 18px 18px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(142,240,207,.45), rgba(255,122,182,.32), transparent);
    }

    .wheel-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .stage {
      position: relative;
      width: min(100%, 296px);
      aspect-ratio: 1;
      margin: 0 auto;
      display: grid;
      place-items: center;
      filter:
        drop-shadow(0 26px 32px rgba(0,0,0,.35))
        drop-shadow(0 0 34px rgba(255, 208, 128, .22))
        drop-shadow(0 0 22px rgba(125, 247, 255, .14));
    }

    .stage::before,
    .stage::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    .stage::before {
      inset: -17px;
      border: 1px solid rgba(255,208,128,.22);
      background:
        repeating-conic-gradient(from 0deg, rgba(255,208,128,.95) 0 3deg, transparent 3deg 15deg),
        radial-gradient(circle, transparent 59%, rgba(255,208,128,.14) 60% 66%, transparent 67%),
        conic-gradient(from 45deg, transparent, rgba(125,247,255,.18), transparent, rgba(255,122,182,.16), transparent);
      animation: haloSpin 12s linear infinite;
      box-shadow:
        0 0 30px rgba(255,208,128,.18),
        inset 0 0 22px rgba(255,208,128,.08);
    }

    .stage::after {
      inset: -7px;
      border: 1px dashed rgba(255,255,255,.18);
      background:
        repeating-conic-gradient(from 8deg, rgba(255,255,255,.20) 0 2deg, transparent 2deg 22deg);
      mix-blend-mode: screen;
      opacity: .48;
    }

    @keyframes haloSpin {
      to { transform: rotate(360deg); }
    }

    @keyframes casinoPulse {
      0%, 100% {
        filter: brightness(1);
        opacity: .62;
      }
      50% {
        filter: brightness(1.75);
        opacity: .95;
      }
    }

    @keyframes centerBlink {
      0%, 100% {
        box-shadow:
          0 0 26px rgba(0,0,0,.28),
          inset 0 0 18px rgba(142,240,207,.08);
      }
      50% {
        box-shadow:
          0 0 34px rgba(255,208,128,.35),
          0 0 18px rgba(255,122,182,.22),
          inset 0 0 24px rgba(255,208,128,.18);
      }
    }

    @keyframes sparkChase {
      to { transform: rotate(360deg) scale(1.02); }
    }

    @keyframes sparkPop {
      0%, 100% {
        filter: brightness(1);
        opacity: .72;
      }
      50% {
        filter: brightness(1.95) saturate(1.35);
        opacity: 1;
      }
    }

    @keyframes wheelGlow {
      0% { filter: saturate(1) brightness(1); }
      100% { filter: saturate(1.35) brightness(1.16); }
    }

    .spark-ring {
      position: absolute;
      inset: -31px;
      z-index: 0;
      border-radius: 50%;
      pointer-events: none;
      opacity: .46;
      background:
        radial-gradient(circle at 50% 0%, #fff8df 0 5px, transparent 6px),
        radial-gradient(circle at 72% 8%, #ffd080 0 4px, transparent 5px),
        radial-gradient(circle at 91% 29%, #ff7ab6 0 5px, transparent 6px),
        radial-gradient(circle at 100% 50%, #7df7ff 0 4px, transparent 5px),
        radial-gradient(circle at 88% 74%, #ffd080 0 5px, transparent 6px),
        radial-gradient(circle at 68% 92%, #fff8df 0 4px, transparent 5px),
        radial-gradient(circle at 50% 100%, #ff7ab6 0 5px, transparent 6px),
        radial-gradient(circle at 28% 92%, #7df7ff 0 4px, transparent 5px),
        radial-gradient(circle at 9% 72%, #ffd080 0 5px, transparent 6px),
        radial-gradient(circle at 0% 50%, #fff8df 0 4px, transparent 5px),
        radial-gradient(circle at 11% 26%, #ff7ab6 0 5px, transparent 6px),
        radial-gradient(circle at 30% 8%, #7df7ff 0 4px, transparent 5px);
      filter: drop-shadow(0 0 10px rgba(255,208,128,.4));
    }

    .stage.spinning .spark-ring {
      animation:
        sparkChase .7s linear infinite,
        sparkPop .2s steps(2, end) infinite;
    }

    .pointer {
      position: absolute;
      top: -2px;
      z-index: 3;
      width: 22px;
      height: 30px;
      clip-path: polygon(50% 100%, 0 0, 100% 0);
      background: linear-gradient(180deg, #fff7d7, var(--gold) 62%, var(--coral));
      box-shadow:
        0 0 18px rgba(255,208,128,.5),
        0 0 28px rgba(255,95,115,.16);
    }

    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      position: relative;
      z-index: 1;
      border: 2px solid rgba(255,208,128,.28);
      background:
        radial-gradient(circle at 50% 50%, transparent 0 35%, rgba(255,255,255,.06) 36% 37%, transparent 38%),
        conic-gradient(
          from -90deg,
          color-mix(in srgb, var(--mint) 54%, #141820) 0 45deg,
          color-mix(in srgb, var(--gold) 54%, #141820) 45deg 90deg,
          color-mix(in srgb, var(--coral) 54%, #141820) 90deg 135deg,
          color-mix(in srgb, var(--violet) 54%, #141820) 135deg 180deg,
          color-mix(in srgb, var(--blue) 54%, #141820) 180deg 225deg,
          color-mix(in srgb, var(--green) 54%, #141820) 225deg 270deg,
          color-mix(in srgb, var(--danger) 42%, #141820) 270deg 315deg,
          color-mix(in srgb, #f7f3ea 30%, #141820) 315deg 360deg
        );
      box-shadow:
        inset 0 0 0 42px rgba(8, 10, 16, .30),
        inset 0 0 42px rgba(255,255,255,.08),
        0 0 0 7px rgba(255,208,128,.055),
        0 0 34px rgba(255,208,128,.10);
      transition: transform 2500ms cubic-bezier(.12,.78,.1,1);
    }

    .wheel.spinning {
      animation: wheelGlow .26s ease-in-out infinite alternate;
      box-shadow:
        inset 0 0 0 42px rgba(8, 10, 16, .32),
        inset 0 0 42px rgba(255,255,255,.08),
        0 0 58px rgba(255,208,128,.34),
        0 0 34px rgba(255,122,182,.24),
        0 0 18px rgba(125,247,255,.20);
    }

    .wheel::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      background:
        repeating-conic-gradient(from -90deg, transparent 0 42deg, rgba(255,255,255,.28) 42deg 45deg),
        repeating-conic-gradient(from -88deg, rgba(255,208,128,.28) 0 1.5deg, transparent 1.5deg 22.5deg),
        radial-gradient(circle, transparent 0 55%, rgba(255,255,255,.12) 56%, transparent 57%);
      pointer-events: none;
    }

    .wheel.spinning::before {
      animation: casinoPulse .22s steps(2, end) infinite;
    }

    .wheel::after {
      content: "SPIN";
      position: absolute;
      inset: 34%;
      display: grid;
      place-items: center;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.16);
      background:
        radial-gradient(circle at 50% 0%, rgba(255,208,128,.24), transparent 45%),
        radial-gradient(circle at 50% 100%, rgba(125,247,255,.12), transparent 48%),
        #10131b;
      font-size: .82rem;
      font-weight: 650;
      letter-spacing: .08em;
      box-shadow:
        0 0 26px rgba(0,0,0,.28),
        inset 0 0 18px rgba(142,240,207,.08);
    }

    .wheel.spinning::after {
      content: "WIN?";
      animation: centerBlink .28s ease-in-out infinite;
      color: #fff7d7;
    }

    .num {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 28px;
      height: 28px;
      margin: -14px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.2);
      background: rgba(9, 11, 16, .52);
      backdrop-filter: blur(10px);
      font-weight: 650;
    }

    .result {
      min-height: 52px;
      display: grid;
      place-items: center;
      text-align: center;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .06);
      padding: 10px;
      color: var(--muted);
    }

    .spin-copy {
      color: var(--muted);
      text-align: center;
      min-height: 20px;
    }

    .danger {
      color: var(--text);
      border-color: rgba(255, 95, 115, .38);
      background: rgba(255, 95, 115, .12);
    }

    .prizes {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .prize {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      padding: 8px 0 0;
      border-top: 1px solid var(--line);
      color: rgba(247, 243, 234, .82);
    }

    .prize:nth-child(7),
    .prize:nth-child(8) {
      color: rgba(255, 208, 128, .95);
    }

    .prize b {
      display: grid;
      place-items: center;
      min-width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .08);
      font-weight: 650;
    }

    @media (max-width: 780px) {
      body {
        padding: 12px;
      }

      body::after {
        right: -220px;
        bottom: 80px;
        font-size: 3.2rem;
      }

      .grid,
      .control-card {
        grid-template-columns: 1fr;
      }

      .score {
        margin: 0 auto;
      }
    }

    @media (max-width: 430px) {
      .pair,
      .prizes,
      .day,
      .rule,
      .quick {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="top">
      <div class="brand">
        <div class="eyebrow">Tonight pact</div>
        <h1>Sylvie Reset</h1>
        <div class="sub">记录烟和 whisky；健康就收工，超线才解锁惩罚转盘。</div>
      </div>
      <span id="status" class="status safe">Ready</span>
    </header>

    <section class="grid">
      <div class="stack">
        <section class="card control-card">
          <div id="ring" class="score" aria-label="今日健康分">
            <strong id="score">100</strong>
          </div>

          <div class="controls">
            <label>
              日期
              <input id="date" type="date">
            </label>

            <label>
              烟 <span id="smokeVal">0</span> 根
              <input id="smoke" type="range" min="0" max="30" value="0">
            </label>
            <div class="quick" aria-label="香烟快捷选择">
              <button type="button" data-smoke="0">0根</button>
              <button type="button" data-smoke="1">1根</button>
              <button type="button" data-smoke="3">3根</button>
              <button type="button" data-smoke="5">5根</button>
              <button type="button" data-smoke="10">10根</button>
            </div>

            <label>
              Whisky <span id="drinkVal">0</span> 杯
              <input id="drink" type="range" min="0" max="8" step="0.5" value="0">
            </label>
            <div class="quick" aria-label="威士忌快捷选择">
              <button type="button" data-drink="0">0杯</button>
              <button type="button" data-drink="1">1杯</button>
              <button type="button" data-drink="2">2杯</button>
              <button type="button" data-drink="3">3杯</button>
              <button type="button" data-drink="4">4杯</button>
            </div>

            <div class="meta">
              <span class="chip" id="delta">过关</span>
              <span class="chip" id="tickets">0罚券</span>
              <span class="chip" id="streak">0天</span>
            </div>

            <div id="note" class="note">健康日不用转盘。</div>
            <div class="rule" aria-label="评分规则">
              <div class="rule-item"><strong>80+</strong><span>Safe，不抽卡</span></div>
              <div class="rule-item"><strong>65-79</strong><span>Watch，1 张</span></div>
              <div class="rule-item"><strong>5+2</strong><span>Buffer，不惩罚</span></div>
              <div class="rule-item"><strong>8根+</strong><span>Big，强惩罚</span></div>
            </div>

            <div class="actions">
              <button class="primary" id="save">保存今日</button>
              <button id="reset">清零</button>
              <button class="ghost" id="demo">示例</button>
            </div>
          </div>
        </section>

        <section class="card stack">
          <div class="history-head">
            <h2>最近</h2>
            <button class="ghost" id="clear">清空</button>
          </div>
          <div id="history" class="history"></div>
        </section>
      </div>

      <aside class="card wheel-card">
        <div class="wheel-top">
          <h2>Penalty Wheel</h2>
          <span class="status">1 罚券启动</span>
        </div>

        <div id="stage" class="stage" aria-label="惩罚转盘">
          <div class="spark-ring" aria-hidden="true"></div>
          <div class="pointer"></div>
          <div id="wheel" class="wheel">
            <span class="num" style="transform:rotate(22.5deg) translateY(-99px) rotate(-22.5deg)">1</span>
            <span class="num" style="transform:rotate(67.5deg) translateY(-99px) rotate(-67.5deg)">2</span>
            <span class="num" style="transform:rotate(112.5deg) translateY(-99px) rotate(-112.5deg)">3</span>
            <span class="num" style="transform:rotate(157.5deg) translateY(-99px) rotate(-157.5deg)">4</span>
            <span class="num" style="transform:rotate(202.5deg) translateY(-99px) rotate(-202.5deg)">5</span>
            <span class="num" style="transform:rotate(247.5deg) translateY(-99px) rotate(-247.5deg)">6</span>
            <span class="num" style="transform:rotate(292.5deg) translateY(-99px) rotate(-292.5deg)">7</span>
            <span class="num" style="transform:rotate(337.5deg) translateY(-99px) rotate(-337.5deg)">8</span>
          </div>
        </div>

        <button class="primary" id="spin">抽取惩罚</button>
        <div id="spinCopy" class="spin-copy">有罚券才需要启动转盘。</div>
        <div id="result" class="result">低分日会生成罚券。</div>
        <div id="prizes" class="prizes"></div>
      </aside>
    </section>
  </main>

  <script>
    (() => {
      const $ = (id) => document.getElementById(id);
      const key = "sylvie-penalty-wheel-v2";
      const prizes = [
        ["醒酒水吧", "立刻做一杯无酒精特调，再喝一大杯水"],
        ["夜走还债", "出门走30分钟，回来才能刷手机"],
        ["明日零烟", "明天挑战0根；失败自动加2张罚券"],
        ["手机封印", "睡前60分钟手机放远，只能聊天或睡觉"],
        ["家务还债", "今晚完成两件家务：洗杯子、倒垃圾、整理桌面任选二"],
        ["真心复盘", "10分钟复盘触发原因，并写下明天的具体限制"],
        ["双倍关卡", "明天烟酒都达标，才能清掉2张罚券"],
        ["大惩罚", "明天0烟+0酒；失败请一顿正餐并追加2张罚券"]
      ];
      let spinning = false;
      let rotation = 0;

      const base = { tickets: 0, records: [] };
      const load = () => {
        try {
          return { ...base, ...JSON.parse(localStorage.getItem(key) || "{}") };
        } catch {
          return { ...base };
        }
      };
      const saveState = (state) => localStorage.setItem(key, JSON.stringify(state));
      const iso = (date) => {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, "0");
        const d = String(date.getDate()).padStart(2, "0");
        return `${y}-${m}-${d}`;
      };

      function scoreDay(smoke, drink) {
        const smokePenalty = smoke === 0 ? 0 : smoke <= 5 ? smoke * 3 : Math.min(82, 15 + (smoke - 5) * 8);
        let drinkPenalty = 0;
        if (drink > 0 && drink <= 1) drinkPenalty = 3;
        if (drink > 1 && drink <= 2) drinkPenalty = 10;
        if (drink > 2 && drink < 4) drinkPenalty = 18 + Math.round((drink - 2) * 12);
        if (drink >= 4) drinkPenalty = 48 + Math.round((drink - 4) * 12);
        const score = Math.max(0, 100 - smokePenalty - drinkPenalty);
        const inBuffer = smoke <= 5 && drink <= 2;
        const forcedBig = score < 45 || smoke >= 8 || drink >= 4;
        const ticket = inBuffer ? 0 : score >= 80 ? 0 : score >= 65 ? 1 : forcedBig ? 3 : 2;
        const reason = inBuffer && (smoke > 0 || drink > 0) ? "缓冲线内" :
          smoke === 0 && drink <= 1 ? "状态在线" :
          smoke > 0 && drink > 1 ? "烟酒都超线" :
          smoke > 0 ? "香烟触发扣分" : "酒精触发扣分";
        const note = inBuffer ? `${reason}，今天不惩罚；明天争取少一根。` :
          score >= 80 ? `${reason}，今天不用转盘。` :
          score >= 65 ? `${reason}，生成1张罚券。` :
          forcedBig ? `${reason}，触发红线：强制大惩罚。` : `${reason}，生成2张惩罚券。`;
        return { score, ticket, note, forcedBig, inBuffer };
      }

      function values() {
        return {
          date: $("date").value || iso(new Date()),
          smoke: Number($("smoke").value),
          drink: Number($("drink").value),
          mood: "daily"
        };
      }

      function streak(records) {
        let count = 0;
        for (const item of [...records].sort((a, b) => b.date.localeCompare(a.date))) {
          if (item.score >= 80) count += 1;
          else break;
        }
        return count;
      }

      function paint() {
        const state = load();
        const current = values();
        const scored = scoreDay(current.smoke, current.drink);
        const status = $("status");
        $("smokeVal").textContent = current.smoke;
        $("drinkVal").textContent = current.drink;
        $("score").textContent = scored.score;
        $("ring").style.setProperty("--score", scored.score);
        const color = scored.score >= 80 ? "var(--mint)" : scored.score >= 65 ? "var(--coral)" : "var(--danger)";
        $("ring").style.background = `radial-gradient(circle at center, #10131b 0 57%, transparent 58%), conic-gradient(${color} calc(${scored.score} * 1%), rgba(255,255,255,.12) 0)`;
        $("delta").textContent = scored.forcedBig ? "大惩罚" : scored.ticket ? `+${scored.ticket}罚券` : "过关";
        $("tickets").textContent = `${state.tickets}罚券`;
        $("streak").textContent = `${streak(state.records)}天`;
        $("note").textContent = scored.note;
        status.classList.remove("safe", "watch", "penalty");
        if (scored.inBuffer) {
          status.textContent = "Buffer";
          status.classList.add("safe");
        } else if (scored.score >= 80) {
          status.textContent = "Safe";
          status.classList.add("safe");
        } else if (scored.score >= 65) {
          status.textContent = "Watch";
          status.classList.add("watch");
        } else if (scored.forcedBig) {
          status.textContent = "Big";
          status.classList.add("penalty");
        } else {
          status.textContent = "Penalty";
          status.classList.add("penalty");
        }
        document.querySelectorAll("[data-smoke]").forEach((button) => {
          button.classList.toggle("active", Number(button.dataset.smoke) === current.smoke);
        });
        document.querySelectorAll("[data-drink]").forEach((button) => {
          button.classList.toggle("active", Number(button.dataset.drink) === current.drink);
        });
      }

      function renderHistory() {
        const state = load();
        const rows = [...state.records].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 7);
        $("history").innerHTML = rows.length ? rows.map((item) => `
          <div class="day">
            <strong>${item.date.slice(5)}</strong>
            <div class="bars">
              <div class="tiny"><span>烟 ${item.smoke}</span><span>酒 ${item.drink}</span></div>
              <div class="bar smoke"><span style="width:${Math.min(100, item.smoke / 30 * 100)}%"></span></div>
              <div class="bar drink"><span style="width:${Math.min(100, item.drink / 8 * 100)}%"></span></div>
            </div>
            <span class="status">${item.score}</span>
          </div>
        `).join("") : '<div class="empty">还没有记录。</div>';
      }

      function saveRecord() {
        const state = load();
        const current = values();
        const scored = scoreDay(current.smoke, current.drink);
        const old = state.records.find((item) => item.date === current.date);
        state.records = state.records.filter((item) => item.date !== current.date).concat({ ...current, ...scored });
        state.tickets = Math.max(0, state.tickets - (old ? old.ticket : 0) + scored.ticket);
        saveState(state);
        $("result").textContent = scored.ticket ? "罚券已生成，去转惩罚。" : "健康日过关，不用惩罚。";
        $("spinCopy").textContent = scored.ticket ? "现在可以抽一张惩罚卡。" : "今晚过关，转盘保持锁定。";
        $("result").classList.toggle("danger", Boolean(scored.ticket));
        paint();
        renderHistory();
      }

      function reset() {
        $("smoke").value = 0;
        $("drink").value = 0;
        $("spinCopy").textContent = "有罚券才需要启动转盘。";
        paint();
      }

      function demo() {
        const state = load();
        const samples = [
          { offset: 3, smoke: 0, drink: 0, mood: "轻松" },
          { offset: 2, smoke: 8, drink: 2, mood: "一般" },
          { offset: 1, smoke: 0, drink: .5, mood: "轻松" }
        ];
        for (const sample of samples) {
          const date = new Date();
          date.setDate(date.getDate() - sample.offset);
          const dateText = iso(date);
          const scored = scoreDay(sample.smoke, sample.drink);
          const old = state.records.find((item) => item.date === dateText);
          state.records = state.records.filter((item) => item.date !== dateText).concat({ date: dateText, ...sample, ...scored });
          state.tickets = Math.max(0, state.tickets - (old ? old.ticket : 0) + scored.ticket);
        }
        saveState(state);
        $("status").textContent = "已填入";
        paint();
        renderHistory();
      }

      function spin() {
        const state = load();
        if (spinning) return;
        if (state.tickets < 1) {
          $("result").textContent = "没有罚券：今天健康的话不用转。";
          $("spinCopy").textContent = "状态不错，别硬罚。";
          $("result").classList.remove("danger");
          return;
        }
        spinning = true;
        state.tickets -= 1;
        saveState(state);
        $("tickets").textContent = `${state.tickets}罚券`;
        const current = values();
        const currentScored = scoreDay(current.smoke, current.drink);
        const latest = [...state.records].sort((a, b) => b.date.localeCompare(a.date))[0];
        const mustBig = Boolean(currentScored.forcedBig || (latest && latest.forcedBig));
        const index = mustBig ? prizes.length - 1 : Math.floor(Math.random() * prizes.length);
        const center = index * 45 + 22.5;
        const currentAngle = ((rotation % 360) + 360) % 360;
        const targetAngle = (360 - center) % 360;
        const travel = ((targetAngle - currentAngle + 360) % 360) || 360;
        rotation += (5 + Math.floor(Math.random() * 3)) * 360 + travel;
        $("wheel").classList.add("spinning");
        $("stage").classList.add("spinning");
        $("wheel").style.transform = `rotate(${rotation}deg)`;
        $("result").textContent = mustBig ? "红线触发：大惩罚锁定中..." : "惩罚抽取中...";
        $("spinCopy").textContent = mustBig ? "低于45分或严重超线，不能抽轻惩罚。" : "愿赌服输，抽到几号算几号。";
        $("result").classList.add("danger");
        window.setTimeout(() => {
          const label = mustBig ? "强制大惩罚" : `${index + 1}. ${prizes[index][0]}`;
          $("result").innerHTML = `<strong>${label}</strong><br><span class="sub">${prizes[index][1]}</span>`;
          $("spinCopy").textContent = mustBig ? "今天不走运气，直接执行红线规则。" : "抽完就执行，执行完就翻篇。";
          $("wheel").classList.remove("spinning");
          $("stage").classList.remove("spinning");
          spinning = false;
          paint();
          renderHistory();
        }, 2500);
      }

      $("date").value = iso(new Date());
      $("prizes").innerHTML = prizes.map((item, index) => `<div class="prize"><b>${index + 1}</b><span>${item[0]}</span></div>`).join("");
      ["date", "smoke", "drink"].forEach((id) => $(id).addEventListener("input", paint));
      $("save").addEventListener("click", saveRecord);
      $("reset").addEventListener("click", reset);
      $("demo").addEventListener("click", demo);
      $("spin").addEventListener("click", spin);
      document.querySelectorAll("[data-smoke]").forEach((button) => {
        button.addEventListener("click", () => {
          $("smoke").value = button.dataset.smoke;
          paint();
        });
      });
      document.querySelectorAll("[data-drink]").forEach((button) => {
        button.addEventListener("click", () => {
          $("drink").value = button.dataset.drink;
          paint();
        });
      });
      $("clear").addEventListener("click", () => {
        localStorage.removeItem(key);
        $("status").textContent = "未保存";
        $("result").textContent = "记录已清空。";
        $("spinCopy").textContent = "有罚券才需要启动转盘。";
        $("result").classList.remove("danger");
        paint();
        renderHistory();
      });
      paint();
      renderHistory();
    })();
  </script>
</body>
</html>
