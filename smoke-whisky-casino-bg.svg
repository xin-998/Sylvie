      <stop offset="0" stop-color="#ffd080" stop-opacity=".42"/>
      <stop offset=".35" stop-color="#ff8a7a" stop-opacity=".18"/>
      <stop offset="1" stop-color="#090b10" stop-opacity="0"/>
