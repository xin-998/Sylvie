<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>今天怎么样</title>
  <style>
:root {
  --background: #fbfaf7;
  --foreground: #24211f;
  --card: #fffdf8;
  --card-foreground: #24211f;
  --muted: #ece8df;
  --muted-foreground: #756d65;
  --border: #ddd5c9;
  --input: #ddd5c9;
  --ring: #7fa59b;
  --primary: #24211f;
  --primary-foreground: #fffdf8;
  --secondary: #e8dfd1;
  --secondary-foreground: #24211f;
  --accent: #b7d7cf;
  --accent-foreground: #24211f;
  --destructive: #c86c63;
  --viz-series-1: #7fa59b;
  --viz-series-2: #e6b86f;
  --viz-series-3: #d7927d;
  --viz-series-4: #a9a0d8;
  --viz-series-5: #8fb6d9;
  --viz-series-6: #c2c978;
  color-scheme: light;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  background: radial-gradient(circle at 25% 0%, rgba(183, 215, 207, .34), transparent 34%), var(--background);
  color: var(--foreground);
  font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  padding: 18px;
}
.wrap { width: min(980px, 100%); margin: 0 auto; }
.card {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  background: var(--card);
  color: var(--card-foreground);
}
.btn {
  appearance: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--card);
  color: var(--foreground);
  padding: 9px 12px;
  font: inherit;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  cursor: pointer;
}
.btn-primary { background: var(--primary); color: var(--primary-foreground); border-color: var(--primary); }
.btn-ghost { background: transparent; }
.viz-controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.viz-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 5px 9px;
  background: color-mix(in srgb, var(--card) 76%, var(--accent) 24%);
  white-space: nowrap;
}
.form-label { color: var(--foreground); }
.form-control, .form-select {
  border: 1px solid var(--input);
  border-radius: 8px;
  background: var(--card);
  color: var(--foreground);
  padding: 9px 10px;
  font: inherit;
}
.form-range { accent-color: var(--primary); }
.text-small { font-size: .88rem; }
.sub, .text-muted { color: var(--muted-foreground); }
i[data-lucide] { display: none; }
@media (max-width: 520px) { body { padding: 12px; } .card { padding: 12px; } }
  </style>
</head>
<body>
  <main class="wrap">
<div id="daily-habit-wheel" class="dhw">
  <style>
    #daily-habit-wheel {
      --line: color-mix(in srgb, var(--border) 76%, transparent);
      --soft: color-mix(in srgb, var(--muted) 36%, transparent);
      --glow: color-mix(in srgb, var(--accent) 22%, transparent);
      --danger-soft: color-mix(in srgb, var(--destructive) 16%, transparent);
      --good: var(--viz-series-1);
      --warn: var(--viz-series-3);
      --bad: var(--destructive);
      color: var(--foreground);
    }

    #daily-habit-wheel .app {
      display: grid;
      gap: 14px;
      padding: 4px;
    }

    #daily-habit-wheel .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 4px 2px;
      flex-wrap: wrap;
    }

    #daily-habit-wheel h2,
    #daily-habit-wheel h3 {
      margin: 0;
    }

    #daily-habit-wheel .sub {
      color: var(--muted-foreground);
    }

    #daily-habit-wheel .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 330px);
      gap: 14px;
      align-items: start;
    }

    #daily-habit-wheel .stack {
      display: grid;
      gap: 12px;
    }

    #daily-habit-wheel .card {
      background:
        linear-gradient(145deg, color-mix(in srgb, var(--card) 96%, var(--accent) 4%), var(--card));
      box-shadow: 0 18px 42px color-mix(in srgb, var(--foreground) 8%, transparent);
    }

    #daily-habit-wheel .today {
      display: grid;
      grid-template-columns: 132px minmax(0, 1fr);
      gap: 16px;
      align-items: center;
    }

    #daily-habit-wheel .score-ring {
      --score: 100;
      width: 124px;
      aspect-ratio: 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at center, var(--card) 0 58%, transparent 59%),
        conic-gradient(var(--good) calc(var(--score) * 1%), var(--soft) 0);
      border: 1px solid var(--line);
      box-shadow: inset 0 0 0 10px color-mix(in srgb, var(--background) 44%, transparent);
    }

    #daily-habit-wheel .score-ring strong {
      font-weight: 500;
    }

    #daily-habit-wheel .fields {
      display: grid;
      gap: 12px;
    }

    #daily-habit-wheel .field {
      display: grid;
      gap: 6px;
    }

    #daily-habit-wheel .pair {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    #daily-habit-wheel .field input,
    #daily-habit-wheel .field select {
      width: 100%;
    }

    #daily-habit-wheel .mini {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      padding-top: 2px;
    }

    #daily-habit-wheel .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    #daily-habit-wheel .pill {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: color-mix(in srgb, var(--card) 82%, var(--accent) 18%);
    }

    #daily-habit-wheel .wheel-card {
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 0%, color-mix(in srgb, var(--accent) 30%, transparent), transparent 42%),
        linear-gradient(180deg, color-mix(in srgb, var(--card) 94%, var(--accent) 6%), var(--card));
    }

    #daily-habit-wheel .wheel-zone {
      display: grid;
      place-items: center;
      gap: 12px;
    }

    #daily-habit-wheel .wheel-stage {
      position: relative;
      width: min(100%, 276px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      filter:
        drop-shadow(0 18px 26px color-mix(in srgb, var(--foreground) 13%, transparent))
        drop-shadow(0 0 22px color-mix(in srgb, var(--accent) 18%, transparent));
    }

    #daily-habit-wheel .pointer {
      position: absolute;
      top: -1px;
      z-index: 2;
      width: 0;
      height: 0;
      border-left: 11px solid transparent;
      border-right: 11px solid transparent;
      border-top: 22px solid var(--foreground);
      filter: drop-shadow(0 4px 0 color-mix(in srgb, var(--foreground) 12%, transparent));
    }

    #daily-habit-wheel .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 1px solid var(--line);
      position: relative;
      background:
        conic-gradient(
          from -90deg,
          color-mix(in srgb, var(--viz-series-1) 40%, var(--card)) 0 45deg,
          color-mix(in srgb, var(--viz-series-2) 40%, var(--card)) 45deg 90deg,
          color-mix(in srgb, var(--viz-series-3) 40%, var(--card)) 90deg 135deg,
          color-mix(in srgb, var(--viz-series-4) 40%, var(--card)) 135deg 180deg,
          color-mix(in srgb, var(--viz-series-5) 40%, var(--card)) 180deg 225deg,
          color-mix(in srgb, var(--viz-series-6) 40%, var(--card)) 225deg 270deg,
          color-mix(in srgb, var(--accent) 58%, var(--card)) 270deg 315deg,
          color-mix(in srgb, var(--secondary) 70%, var(--card)) 315deg 360deg
        );
      box-shadow: inset 0 0 0 42px color-mix(in srgb, var(--background) 28%, transparent);
      transition: transform 2400ms cubic-bezier(.12,.76,.1,1);
    }

    #daily-habit-wheel .wheel::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      background:
        repeating-conic-gradient(from -90deg, transparent 0 43deg, color-mix(in srgb, var(--foreground) 16%, transparent) 43deg 45deg);
      pointer-events: none;
    }

    #daily-habit-wheel .wheel::after {
      content: "PENALTY";
      position: absolute;
      inset: 35%;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 24%, color-mix(in srgb, var(--accent) 24%, transparent), transparent 34%),
        var(--card);
      border: 1px solid var(--line);
      font-weight: 500;
      color: var(--foreground);
    }

    #daily-habit-wheel .num {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 26px;
      height: 26px;
      margin: -13px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: color-mix(in srgb, var(--card) 84%, transparent);
      font-weight: 500;
      border: 1px solid var(--line);
    }

    #daily-habit-wheel .result {
      min-height: 42px;
      width: 100%;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: color-mix(in srgb, var(--card) 84%, var(--accent) 16%);
    }

    #daily-habit-wheel .danger {
      background: color-mix(in srgb, var(--card) 84%, var(--destructive) 16%);
      border-color: color-mix(in srgb, var(--destructive) 38%, var(--border));
    }

    #daily-habit-wheel .prizes {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      width: 100%;
    }

    #daily-habit-wheel .prize {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
      padding: 7px 0;
      border-top: 1px solid var(--line);
    }

    #daily-habit-wheel .prize b {
      display: inline-grid;
      place-items: center;
      min-width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--soft);
      font-weight: 500;
    }

    #daily-habit-wheel .history {
      display: grid;
      gap: 8px;
    }

    #daily-habit-wheel .day {
      display: grid;
      grid-template-columns: 64px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid var(--line);
    }

    #daily-habit-wheel .day:last-child {
      border-bottom: 0;
    }

    #daily-habit-wheel .bars {
      display: grid;
      gap: 4px;
    }

    #daily-habit-wheel .bar {
      height: 7px;
      border-radius: 999px;
      background: var(--soft);
      overflow: hidden;
    }

    #daily-habit-wheel .bar span {
      display: block;
      height: 100%;
      border-radius: 999px;
    }

    #daily-habit-wheel .smoke span {
      background: var(--bad);
    }

    #daily-habit-wheel .drink span {
      background: var(--warn);
    }

    #daily-habit-wheel .empty {
      padding: 8px 0;
      color: var(--muted-foreground);
      text-align: center;
    }

    @media (max-width: 740px) {
      #daily-habit-wheel .grid,
      #daily-habit-wheel .today {
        grid-template-columns: 1fr;
      }

      #daily-habit-wheel .score-ring {
        margin: 0 auto;
      }
    }

    @media (max-width: 430px) {
      #daily-habit-wheel .pair,
      #daily-habit-wheel .prizes,
      #daily-habit-wheel .day {
        grid-template-columns: 1fr;
      }
    }
  </style>

  <div class="app">
    <header class="top">
      <div>
        <h2>今天怎么样</h2>
        <div class="sub">健康就过关，不健康才转惩罚。</div>
      </div>
      <span id="dhw-status" class="viz-badge">未保存</span>
    </header>

    <section class="grid">
      <main class="stack">
        <div class="card today">
          <div id="dhw-ring" class="score-ring" aria-label="今日健康分">
            <strong id="dhw-score">100</strong>
          </div>

          <div class="fields">
            <div class="pair">
              <label class="form-label field">
                日期
                <input id="dhw-date" class="form-control" type="date">
              </label>
              <label class="form-label field">
                状态
                <select id="dhw-mood" class="form-select">
                  <option value="轻松">轻松</option>
                  <option value="一般">一般</option>
                  <option value="压力大">压力大</option>
                  <option value="社交局">社交局</option>
                </select>
              </label>
            </div>

            <label class="form-label field">
              烟 <span id="dhw-smoke-value">0</span> 根
              <input id="dhw-smoke" class="form-range" type="range" min="0" max="30" value="0">
            </label>

            <label class="form-label field">
              威士忌 <span id="dhw-drink-value">0</span> 杯
              <input id="dhw-drink" class="form-range" type="range" min="0" max="8" step="0.5" value="0">
            </label>

            <div class="mini">
              <div class="pill-row">
                <span class="pill"><i data-lucide="shield-check" aria-hidden="true"></i><span id="dhw-delta">过关</span></span>
                <span class="pill"><i data-lucide="ticket" aria-hidden="true"></i><span id="dhw-tokens">0罚券</span></span>
                <span class="pill"><i data-lucide="flame" aria-hidden="true"></i><span id="dhw-streak">0天</span></span>
              </div>
            </div>

            <div id="dhw-note" class="text-small sub">健康日不用转盘。</div>

            <div class="viz-controls">
              <button id="dhw-save" class="btn btn-primary" type="button"><i data-lucide="save" aria-hidden="true"></i>保存</button>
              <button id="dhw-reset" class="btn" type="button"><i data-lucide="rotate-ccw" aria-hidden="true"></i>重置</button>
              <button id="dhw-demo" class="btn btn-ghost" type="button"><i data-lucide="wand-sparkles" aria-hidden="true"></i>示例</button>
            </div>
          </div>
        </div>

        <div class="card stack">
          <div class="mini">
            <h3>最近</h3>
            <button id="dhw-clear" class="btn btn-ghost" type="button"><i data-lucide="trash-2" aria-hidden="true"></i>清空</button>
          </div>
          <div id="dhw-history" class="history" aria-live="polite"></div>
        </div>
      </main>

      <aside class="card wheel-card stack">
          <div class="mini">
          <h3>惩罚转盘</h3>
          <span class="viz-badge">1罚券</span>
        </div>
        <div class="wheel-zone">
          <div class="wheel-stage" aria-label="幸运转盘">
            <div class="pointer" aria-hidden="true"></div>
            <div id="dhw-wheel" class="wheel" role="img" aria-label="八格转盘">
              <span class="num" style="transform: rotate(22.5deg) translateY(-92px) rotate(-22.5deg);">1</span>
              <span class="num" style="transform: rotate(67.5deg) translateY(-92px) rotate(-67.5deg);">2</span>
              <span class="num" style="transform: rotate(112.5deg) translateY(-92px) rotate(-112.5deg);">3</span>
              <span class="num" style="transform: rotate(157.5deg) translateY(-92px) rotate(-157.5deg);">4</span>
              <span class="num" style="transform: rotate(202.5deg) translateY(-92px) rotate(-202.5deg);">5</span>
              <span class="num" style="transform: rotate(247.5deg) translateY(-92px) rotate(-247.5deg);">6</span>
              <span class="num" style="transform: rotate(292.5deg) translateY(-92px) rotate(-292.5deg);">7</span>
              <span class="num" style="transform: rotate(337.5deg) translateY(-92px) rotate(-337.5deg);">8</span>
            </div>
          </div>
          <button id="dhw-spin" class="btn btn-primary" type="button"><i data-lucide="sparkles" aria-hidden="true"></i>执行惩罚</button>
          <div id="dhw-result" class="result text-small sub">低分日会生成罚券。</div>
          <div id="dhw-prizes" class="prizes"></div>
        </div>
      </aside>
    </section>
  </div>

  <script>
    (() => {
      const root = document.getElementById("daily-habit-wheel");
      const $ = (id) => root.querySelector(`#${id}`);
      const storageKey = "daily-habit-wheel-penalty-v1";
      const prizes = [
        ["倒水按摩", "倒水并按摩10分钟"],
        ["散步20分", "一起出去走一圈"],
        ["家务一件", "你负责完成"],
        ["明日0烟", "失败再加1罚券"],
        ["早睡挑战", "今晚提前上床"],
        ["无酒饮料", "给她准备一杯"],
        ["复盘5分", "聊聊触发原因"],
        ["轻罚提醒", "写一句明天目标"]
      ];
      let spinning = false;
      let rotation = 0;

      const baseState = { tokens: 0, records: [] };
      const load = () => {
        try {
          return { ...baseState, ...JSON.parse(localStorage.getItem(storageKey) || "{}") };
        } catch {
          return { ...baseState };
        }
      };
      const saveState = (state) => localStorage.setItem(storageKey, JSON.stringify(state));
      const isoDate = (date) => {
        const yyyy = date.getFullYear();
        const mm = String(date.getMonth() + 1).padStart(2, "0");
        const dd = String(date.getDate()).padStart(2, "0");
        return `${yyyy}-${mm}-${dd}`;
      };

      const scoreDay = (smoke, drink) => {
        const smokePenalty = smoke === 0 ? 0 : Math.min(55, 10 + smoke * 3);
        let drinkPenalty = 0;
        if (drink > 0 && drink <= 1) drinkPenalty = 2;
        if (drink > 1 && drink < 4) drinkPenalty = 10 + Math.round((drink - 1) * 8);
        if (drink >= 4) drinkPenalty = 38 + Math.round((drink - 4) * 10);
        const score = Math.max(0, 100 - smokePenalty - drinkPenalty);
        const delta = score >= 75 ? 0 : score >= 60 ? 1 : 2;
        const note = score >= 75 ? "健康日不用转盘。" :
          score >= 60 ? "轻微超线，生成1张罚券。" : "今天超线明显，生成2张罚券。";
        return { score, delta, note };
      };

      const values = () => ({
        date: $("dhw-date").value || isoDate(new Date()),
        smoke: Number($("dhw-smoke").value),
        drink: Number($("dhw-drink").value),
        mood: $("dhw-mood").value
      });

      const streak = (records) => {
        let count = 0;
        for (const item of [...records].sort((a, b) => b.date.localeCompare(a.date))) {
          if (item.score >= 75) count += 1;
          else break;
        }
        return count;
      };

      const paint = () => {
        const state = load();
        const v = values();
        const scored = scoreDay(v.smoke, v.drink);
        $("dhw-smoke-value").textContent = v.smoke;
        $("dhw-drink-value").textContent = v.drink;
        $("dhw-score").textContent = scored.score;
        $("dhw-ring").style.setProperty("--score", scored.score);
        $("dhw-ring").style.background =
          `radial-gradient(circle at center, var(--card) 0 58%, transparent 59%), conic-gradient(${scored.score >= 75 ? "var(--good)" : scored.score >= 60 ? "var(--warn)" : "var(--bad)"} calc(${scored.score} * 1%), var(--soft) 0)`;
        $("dhw-delta").textContent = scored.delta ? `+${scored.delta}罚券` : "过关";
        $("dhw-tokens").textContent = `${state.tokens}罚券`;
        $("dhw-streak").textContent = `${streak(state.records)}天`;
        $("dhw-note").textContent = scored.note;
      };

      const renderHistory = () => {
        const state = load();
        const rows = [...state.records].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 7);
        if (!rows.length) {
          $("dhw-history").innerHTML = '<div class="empty">还没有记录。</div>';
          return;
        }
        $("dhw-history").innerHTML = rows.map((r) => `
          <div class="day">
            <strong>${r.date.slice(5)}</strong>
            <div class="bars" aria-label="${r.date} 烟${r.smoke}根，酒${r.drink}杯，分数${r.score}">
              <div class="mini text-small"><span>烟 ${r.smoke}</span><span>酒 ${r.drink}</span></div>
              <div class="bar smoke"><span style="width:${Math.min(100, r.smoke / 30 * 100)}%"></span></div>
              <div class="bar drink"><span style="width:${Math.min(100, r.drink / 8 * 100)}%"></span></div>
            </div>
            <span class="viz-badge">${r.score}</span>
          </div>
        `).join("");
      };

      const saveRecord = () => {
        const state = load();
        const v = values();
        const scored = scoreDay(v.smoke, v.drink);
        const old = state.records.find((item) => item.date === v.date);
        state.records = state.records.filter((item) => item.date !== v.date).concat({ ...v, ...scored });
        state.tokens = Math.max(0, state.tokens - (old ? old.delta : 0) + scored.delta);
        saveState(state);
        $("dhw-status").textContent = "已保存";
        $("dhw-result").textContent = scored.delta > 0 ? "罚券已生成，去转惩罚。" : "健康日过关，不用惩罚。";
        $("dhw-result").classList.toggle("danger", scored.delta > 0);
        paint();
        renderHistory();
      };

      const reset = () => {
        $("dhw-smoke").value = 0;
        $("dhw-drink").value = 0;
        $("dhw-mood").value = "轻松";
        $("dhw-status").textContent = "未保存";
        paint();
      };

      const demo = () => {
        const state = load();
        const samples = [
          { offset: 3, smoke: 0, drink: 0, mood: "轻松" },
          { offset: 2, smoke: 8, drink: 2, mood: "一般" },
          { offset: 1, smoke: 0, drink: .5, mood: "轻松" }
        ];
        for (const item of samples) {
          const date = new Date();
          date.setDate(date.getDate() - item.offset);
          const dateText = isoDate(date);
          const scored = scoreDay(item.smoke, item.drink);
          const old = state.records.find((r) => r.date === dateText);
          state.records = state.records.filter((r) => r.date !== dateText).concat({ date: dateText, ...item, ...scored });
          state.tokens = Math.max(0, state.tokens - (old ? old.delta : 0) + scored.delta);
        }
        saveState(state);
        $("dhw-status").textContent = "已填入";
        paint();
        renderHistory();
      };

      const spin = () => {
        const state = load();
        if (spinning) return;
        if (state.tokens < 1) {
          $("dhw-result").textContent = "没有罚券：今天健康的话不用转。";
          $("dhw-result").classList.remove("danger");
          return;
        }
        spinning = true;
        state.tokens -= 1;
        saveState(state);
        $("dhw-tokens").textContent = `${state.tokens}罚券`;
        const index = Math.floor(Math.random() * prizes.length);
        const center = index * 45 + 22.5;
        rotation += (5 + Math.floor(Math.random() * 3)) * 360 + (360 - center);
        $("dhw-wheel").style.transform = `rotate(${rotation}deg)`;
        $("dhw-result").textContent = "惩罚抽取中...";
        $("dhw-result").classList.add("danger");
        window.setTimeout(() => {
          $("dhw-result").innerHTML = `<strong>${index + 1}. ${prizes[index][0]}</strong><br><span class="text-small sub">${prizes[index][1]}</span>`;
          spinning = false;
          paint();
          renderHistory();
        }, 2450);
      };

      $("dhw-date").value = isoDate(new Date());
      $("dhw-prizes").innerHTML = prizes.map((p, i) => `<div class="prize"><b>${i + 1}</b><span>${p[0]}</span></div>`).join("");
      ["dhw-date", "dhw-smoke", "dhw-drink"].forEach((id) => $(id).addEventListener("input", paint));
      $("dhw-save").addEventListener("click", saveRecord);
      $("dhw-reset").addEventListener("click", reset);
      $("dhw-demo").addEventListener("click", demo);
      $("dhw-spin").addEventListener("click", spin);
      $("dhw-clear").addEventListener("click", () => {
        localStorage.removeItem(storageKey);
        $("dhw-status").textContent = "未保存";
        $("dhw-result").textContent = "记录已清空。";
        $("dhw-result").classList.remove("danger");
        paint();
        renderHistory();
      });
      paint();
      renderHistory();
      if (window.lucide) window.lucide.createIcons({ attrs: { width: 16, height: 16 } });
    })();
  </script>
</div>

  </main>
</body>
</html>
